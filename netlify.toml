[build]
  publish = "src"

# Deploy Previews for pull requests
[context.deploy-preview]
  publish = "src"

# Redirect old domain to new primary domain
[[redirects]]
  from = "https://flatow.furniture/*"
  to = "https://flatowfurniture.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.flatow.furniture/*"
  to = "https://flatowfurniture.com/:splat"
  status = 301
  force = true

# Cache static assets for 1 year (immutable content)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
