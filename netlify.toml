[build]
  publish = "src"

# Deploy Previews for pull requests
[context.deploy-preview]
  publish = "src"

# Redirect old domain to new primary domain
[[redirects]]
  from = "https://flatow.furniture/*"
  to = "https://flatowfurniture.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.flatow.furniture/*"
  to = "https://flatowfurniture.com/:splat"
  status = 301
  force = true

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Images and fonts: long cache OK — content rarely changes and is referenced
# from many files. If we ever swap a filename, browsers see a new URL.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS and JS: short cache + revalidate. Filenames don't change between
# deploys (no-build pipeline), so an immutable 1-year cache would lock
# users on stale styles.css / main.js forever. With max-age=3600 the
# browser uses cache for an hour, then sends an If-None-Match for a
# cheap 304 if nothing changed.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
