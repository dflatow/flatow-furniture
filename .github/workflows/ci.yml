name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        uses: anishathalye/proof-html@v2
        with:
          directory: src
          check_html: true
          enforce_https: false
          check_opengraph: false
          check_favicon: false
          disable_external: true

      - name: Check file structure
        run: |
          echo "Checking required files exist..."
          test -f src/index.html && echo "✓ index.html"
          test -f src/css/styles.min.css && echo "✓ styles.min.css"
          test -f src/js/main.min.js && echo "✓ main.min.js"
          test -d src/images && echo "✓ images directory"
          echo "All checks passed!"

      - name: Check for broken internal links
        run: |
          echo "Checking internal page references..."
          # Verify all subpage directories have index.html
          for dir in design journal faq contact; do
            test -f "src/$dir/index.html" && echo "✓ $dir/index.html" || { echo "✗ Missing $dir/index.html"; exit 1; }
          done
          echo "All internal pages exist!"

      - name: Check image references
        run: |
          echo "Checking referenced images exist..."
          errors=0
          for html_file in $(find src -name "*.html"); do
            # Extract image src attributes and check they exist
            grep -oP 'src="([^"]*\.(jpg|jpeg|png|gif|svg|webp))"' "$html_file" | grep -oP '"[^"]*"' | tr -d '"' | while read img; do
              # Skip external URLs
              if echo "$img" | grep -q "^http"; then continue; fi
              # Resolve path relative to src/
              if echo "$img" | grep -q "^/"; then
                img_path="src${img}"
              else
                img_path="$(dirname "$html_file")/${img}"
              fi
              if [ ! -f "$img_path" ]; then
                echo "✗ Missing image: $img (referenced in $html_file)"
                exit 1
              fi
            done
          done
          echo "All referenced images exist!"

  pagespeed:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Wait for Netlify deploy
        run: sleep 30

      - name: Run PageSpeed Insights
        run: |
          set +e
          SITE_URL="https://flatowfurniture.netlify.app/"
          API_BASE="https://www.googleapis.com/pagespeedonline/v5/runPagespeed"
          API_KEY="${{ secrets.PAGESPEED_API_KEY }}"

          run_pagespeed() {
            local strategy=$1
            local url="${API_BASE}?url=${SITE_URL}&strategy=${strategy}&category=performance&category=accessibility&category=best-practices&category=seo"
            if [ -n "$API_KEY" ]; then
              url="${url}&key=${API_KEY}"
            fi

            RESPONSE=$(curl -s --max-time 120 "$url")

            # Check for API error
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            if [ -n "$ERROR" ]; then
              echo "## PageSpeed Insights — ${strategy^}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> API error: ${ERROR}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "PageSpeed ${strategy}: API error - ${ERROR}"
              return
            fi

            PERF=$(echo "$RESPONSE" | jq '(.lighthouseResult.categories.performance.score // 0) * 100 | round')
            A11Y=$(echo "$RESPONSE" | jq '(.lighthouseResult.categories.accessibility.score // 0) * 100 | round')
            BP=$(echo "$RESPONSE" | jq '(.lighthouseResult.categories["best-practices"].score // 0) * 100 | round')
            SEO=$(echo "$RESPONSE" | jq '(.lighthouseResult.categories.seo.score // 0) * 100 | round')

            FCP=$(echo "$RESPONSE" | jq -r '.lighthouseResult.audits["first-contentful-paint"].displayValue // "N/A"')
            LCP=$(echo "$RESPONSE" | jq -r '.lighthouseResult.audits["largest-contentful-paint"].displayValue // "N/A"')
            TBT=$(echo "$RESPONSE" | jq -r '.lighthouseResult.audits["total-blocking-time"].displayValue // "N/A"')
            CLS=$(echo "$RESPONSE" | jq -r '.lighthouseResult.audits["cumulative-layout-shift"].displayValue // "N/A"')
            SI=$(echo "$RESPONSE" | jq -r '.lighthouseResult.audits["speed-index"].displayValue // "N/A"')

            echo "## PageSpeed Insights — ${strategy^}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Score |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Performance | **$PERF** |" >> $GITHUB_STEP_SUMMARY
            echo "| Accessibility | **$A11Y** |" >> $GITHUB_STEP_SUMMARY
            echo "| Best Practices | **$BP** |" >> $GITHUB_STEP_SUMMARY
            echo "| SEO | **$SEO** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| First Contentful Paint | $FCP |" >> $GITHUB_STEP_SUMMARY
            echo "| Largest Contentful Paint | $LCP |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Blocking Time | $TBT |" >> $GITHUB_STEP_SUMMARY
            echo "| Cumulative Layout Shift | $CLS |" >> $GITHUB_STEP_SUMMARY
            echo "| Speed Index | $SI |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "=== PageSpeed ${strategy^} ==="
            echo "Performance: $PERF | Accessibility: $A11Y | Best Practices: $BP | SEO: $SEO"
            echo "FCP: $FCP | LCP: $LCP | TBT: $TBT | CLS: $CLS | SI: $SI"
          }

          run_pagespeed "mobile"
          echo ""
          run_pagespeed "desktop"
